---
# =============================================================================
# GUACAMOLE STANDALONE - Secret Generation
# =============================================================================
# Generates secrets if not already set in vault

- name: Generate JSON_SECRET_KEY (128-bit hex)
  ansible.builtin.set_fact:
    guacamole_standalone_json_secret_key: "{{ vault_guacamole_standalone_json_secret_key | default(lookup('pipe', 'openssl rand -hex 16')) }}"

- name: Generate VAULT_ENCRYPTION_KEY (AES-256 base64)
  ansible.builtin.set_fact:
    guacamole_standalone_vault_encryption_key: "{{ vault_guacamole_standalone_vault_encryption_key | default(lookup('pipe', 'openssl rand -base64 32')) }}"

- name: Generate DB password
  ansible.builtin.set_fact:
    guacamole_standalone_db_password: "{{ vault_guacamole_standalone_db_password | default(lookup('pipe', 'openssl rand -base64 24 | tr -d /+=')) }}"

- name: Generate session secret
  ansible.builtin.set_fact:
    guacamole_standalone_session_secret: "{{ vault_guacamole_standalone_session_secret | default(lookup('pipe', 'openssl rand -base64 32')) }}"
